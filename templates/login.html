{% extends "base.html" %}

{% block contingut %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4 text-primary">Bienvenid@ a Odoo</h2>
                    <h3 class="text-center mb-4 text-muted">Inicie sesión</h3>
                    
                    <form action="/login" method="POST">
                        <!-- Campo Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                            <div id="emailHelp" class="form-text">No compartiremos tu correo con nadie más.</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">Iniciar Sesión</button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="mb-2">¿No tienes cuenta?</p>
                        <a href="/registro" class="btn btn-outline-secondary">Registrarse</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
